# ── Server ───────────────────────────────────────────────
server.port=8081

# ── MySQL (WAMP) ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/xtraseats_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ──────────────────────────────────────────────
# Show DEBUG logs for our own code, INFO for everything else
logging.level.com.xtraseats=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Log format: time [LEVEL] class - message
logging.pattern.console=%d{HH:mm:ss.SSS} [%-5level] %logger{25} - %msg%n

# Also write logs to a file
logging.file.name=logs/xtraseats.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{25} - %msg%n

# ── App ──────────────────────────────────────────────────
spring.application.name=xtraseats-backend